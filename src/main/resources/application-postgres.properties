# PostgreSQL profile - run with `mvn spring-boot:run -Dspring-boot.run.profiles=postgres`
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/helpdesk_db?currentSchema=helpdesk}
spring.datasource.username=${DB_USERNAME:helpdesk_user}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.properties.hibernate.default_schema=helpdesk
spring.h2.console.enabled=false
