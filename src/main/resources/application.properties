# Demo database - works with plain `mvn spring-boot:run`
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/helpdesk;MODE=PostgreSQL;DATABASE_TO_UPPER=false}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.open-in-view=false

# H2 console for local demo mode
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# App
spring.application.name=helpdesk
server.port=8082

# JWT
app.jwt.secret=${JWT_SECRET:change-this-development-secret-that-is-32-chars}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
