<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - HelpDesk</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/dashboard.html" class="brand">HelpDesk</a>
    <div class="navbar-links">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/new-ticket.html">New Ticket</a>
      <a href="/admin.html" style="color:var(--primary);font-weight:600">Admin</a>
      <span id="navbar-username" style="color:var(--gray-600);font-size:0.85rem"></span>
      <button class="btn btn-outline" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container">
    <h1 class="page-title">Admin Panel</h1>

    <div class="stats-grid" id="admin-stats" style="margin-bottom:2rem"></div>

    <div class="card" style="margin-bottom:1.5rem">
      <div class="page-header" style="margin-bottom:1rem">
        <h2 style="font-size:1.1rem;font-weight:600">All Tickets</h2>
        <div style="display:flex;gap:0.5rem;align-items:center">
          <span id="user-filter-label" style="font-size:0.8rem;color:var(--gray-600);display:none"></span>
          <select id="filter-status" onchange="filterTickets()" style="padding:0.4rem 0.7rem;border-radius:var(--radius);border:1px solid var(--gray-200);font-size:0.85rem">
            <option value="">All Statuses</option>
            <option value="OPEN">Open</option>
            <option value="IN_PROGRESS">In Progress</option>
            <option value="RESOLVED">Resolved</option>
            <option value="CLOSED">Closed</option>
          </select>
        </div>
      </div>
      <table class="ticket-table">
        <thead>
          <tr><th>#</th><th>Title</th><th>Submitted by</th><th>Priority</th><th>Status</th><th>Assigned to</th><th>Date</th><th>Actions</th></tr>
        </thead>
        <tbody id="all-tickets-tbody">
          <tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--gray-600)">Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="card">
      <h2 style="font-size:1.1rem;font-weight:600;margin-bottom:1rem">User Management</h2>
      <table class="ticket-table">
        <thead>
          <tr><th>Username</th><th>Email</th><th>Role</th><th>Joined</th><th>Actions</th></tr>
        </thead>
        <tbody id="users-tbody">
          <tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--gray-600)">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    requireAuth();
    renderNavbar();

    const user = getUser();
    if (user.role !== 'ADMIN' && user.role !== 'TECHNICIAN') {
      window.location.href = '/dashboard.html';
    }
    const isAdmin = user.role === 'ADMIN';

    let allTickets = [];
    let technicians = [];
    let userFilterId = null; // set when "View tickets" is clicked from the user table

    async function loadAdminData() {
      try {
        [allTickets, technicians] = await Promise.all([
          apiGet('/tickets'),
          apiGet('/users/technicians')
        ]);
        allTickets = allTickets || [];
        technicians = technicians || [];

        document.getElementById('admin-stats').innerHTML = `
          <div class="stat-card"><div class="stat-number">${allTickets.length}</div><div class="stat-label">Total Tickets</div></div>
          <div class="stat-card"><div class="stat-number">${allTickets.filter(t => t.status === 'OPEN').length}</div><div class="stat-label">Open</div></div>
          <div class="stat-card"><div class="stat-number">${allTickets.filter(t => t.status === 'IN_PROGRESS').length}</div><div class="stat-label">In Progress</div></div>
          <div class="stat-card"><div class="stat-number">${allTickets.filter(t => t.status === 'RESOLVED').length}</div><div class="stat-label">Resolved</div></div>
        `;

        filterTickets();
      } catch (e) {
        console.error(e);
      }

      if (!isAdmin) {
        document.getElementById('users-tbody').innerHTML = '<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--gray-600)">Only admins can manage users.</td></tr>';
        return;
      }

      try {
        const users = await apiGet('/users') || [];
        document.getElementById('users-tbody').innerHTML = users.map(u => `
          <tr>
            <td>${escapeHtml(u.username)}</td>
            <td>${escapeHtml(u.email)}</td>
            <td>
              <select onchange="changeRole(${u.id}, this.value)" style="padding:0.3rem 0.5rem;border-radius:var(--radius);border:1px solid var(--gray-200);font-size:0.8rem">
                <option ${u.role === 'USER' ? 'selected' : ''} value="USER">User</option>
                <option ${u.role === 'TECHNICIAN' ? 'selected' : ''} value="TECHNICIAN">Technician</option>
                <option ${u.role === 'ADMIN' ? 'selected' : ''} value="ADMIN">Admin</option>
              </select>
            </td>
            <td>${formatDate(u.createdAt)}</td>
            <td style="display:flex;gap:0.4rem;flex-wrap:wrap">
              <button onclick="viewUserTickets(${u.id}, '${escapeHtml(u.username)}')" class="btn btn-outline" style="padding:0.25rem 0.6rem;font-size:0.78rem">View Tickets</button>
              ${u.username === user.username
                ? ''
                : `<button onclick="deleteUser(${u.id}, '${escapeHtml(u.username)}')" class="btn btn-outline" style="padding:0.25rem 0.6rem;font-size:0.78rem;color:#991b1b;border-color:#fecaca">Delete</button>`
              }
            </td>
          </tr>
        `).join('');
      } catch (e) {
        console.error(e);
      }
    }

    function technicianOptions(selectedId) {
      const options = ['<option value="">Unassigned</option>']
        .concat(technicians.map(t => `<option value="${t.id}" ${t.id === selectedId ? 'selected' : ''}>${escapeHtml(t.username)}</option>`));
      return options.join('');
    }

    function renderTicketTable(tickets) {
      const tbody = document.getElementById('all-tickets-tbody');
      if (tickets.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--gray-600)">No tickets found.</td></tr>';
        return;
      }
      tbody.innerHTML = tickets.map(t => `
        <tr>
          <td>#${t.id}</td>
          <td>${escapeHtml(t.title)}</td>
          <td>${escapeHtml(t.createdBy?.username || '-')}</td>
          <td>${priorityBadge(t.priority)}</td>
          <td>
            <select onchange="changeStatus(${t.id}, this.value)" style="padding:0.3rem 0.5rem;border-radius:var(--radius);border:1px solid var(--gray-200);font-size:0.78rem">
              <option value="OPEN" ${t.status === 'OPEN' ? 'selected' : ''}>Open</option>
              <option value="IN_PROGRESS" ${t.status === 'IN_PROGRESS' ? 'selected' : ''}>In Progress</option>
              <option value="RESOLVED" ${t.status === 'RESOLVED' ? 'selected' : ''}>Resolved</option>
              <option value="CLOSED" ${t.status === 'CLOSED' ? 'selected' : ''}>Closed</option>
            </select>
          </td>
          <td>
            <select onchange="assignTicket(${t.id}, this.value)" style="padding:0.3rem 0.5rem;border-radius:var(--radius);border:1px solid var(--gray-200);font-size:0.78rem">
              ${technicianOptions(t.assignedTo?.id)}
            </select>
          </td>
          <td>${formatDate(t.createdAt)}</td>
          <td style="display:flex;gap:0.4rem;flex-wrap:wrap">
            <a href="/ticket-detail.html?id=${t.id}" class="btn btn-outline" style="padding:0.25rem 0.6rem;font-size:0.78rem">View</a>
            ${isAdmin
              ? `<button onclick="deleteTicket(${t.id})" class="btn btn-outline" style="padding:0.25rem 0.6rem;font-size:0.78rem;color:#991b1b;border-color:#fecaca">Delete</button>`
              : ''
            }
          </td>
        </tr>
      `).join('');
    }

    function filterTickets() {
      const status = document.getElementById('filter-status').value;
      let tickets = allTickets;
      if (userFilterId !== null) tickets = tickets.filter(t => t.createdBy?.id === userFilterId);
      if (status) tickets = tickets.filter(t => t.status === status);
      renderTicketTable(tickets);
    }

    function viewUserTickets(userId, username) {
      userFilterId = userId;
      const label = document.getElementById('user-filter-label');
      label.textContent = `Showing tickets from: ${username} ✕`;
      label.style.display = 'inline';
      label.style.cursor = 'pointer';
      label.onclick = clearUserFilter;
      filterTickets();
      document.querySelector('.card').scrollIntoView({ behavior: 'smooth' });
    }

    function clearUserFilter() {
      userFilterId = null;
      document.getElementById('user-filter-label').style.display = 'none';
      filterTickets();
    }

    async function changeStatus(id, status) {
      try {
        await apiPatch(`/tickets/${id}/status`, { status });
        await loadAdminData();
      } catch (e) {
        alert(e.message || 'Failed to update status.');
      }
    }

    async function assignTicket(ticketId, techId) {
      try {
        if (!techId) return; // "Unassigned" selected — no unassign endpoint, so just skip
        await apiPatch(`/tickets/${ticketId}/assign/${techId}`, {});
        await loadAdminData();
      } catch (e) {
        alert(e.message || 'Failed to assign ticket.');
      }
    }

    async function deleteTicket(id) {
      if (!confirm(`Delete ticket #${id}? This cannot be undone.`)) return;
      try {
        await apiDelete(`/tickets/${id}`);
        await loadAdminData();
      } catch (e) {
        alert(e.message || 'Failed to delete ticket.');
      }
    }

    async function changeRole(userId, role) {
      try {
        await apiPatch(`/users/${userId}/role`, { role });
        await loadAdminData();
      } catch (e) {
        alert(e.message || 'Failed to update role.');
      }
    }

    async function deleteUser(userId, username) {
      if (!confirm(`Delete user "${username}"? This cannot be undone.`)) return;
      try {
        await apiDelete(`/users/${userId}`);
        await loadAdminData();
      } catch (e) {
        alert(e.message || 'Failed to delete user.');
      }
    }

    loadAdminData();
  </script>
</body>
</html>
