<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — HelpDesk</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="card auth-card">
      <h1 class="auth-title">🎫 HelpDesk</h1>
      <p class="auth-subtitle">Sign in to your account</p>

      <div id="alert-box" class="alert alert-error"></div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter email" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-field">
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
          <span class="password-toggle" onclick="togglePassword('password', this)">👁</span>
        </div>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">
        Sign In
      </button>
      <p style="text-align:center;margin-top:1rem;font-size:0.85rem;color:var(--gray-600)">
        Don't have an account? <a href="/register.html">Register</a>
      </p>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    // FIX: was redirecting to /static/dashboard.html which doesn't exist
    if (isLoggedIn()) window.location.href = '/dashboard.html';

    async function doLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) return showAlert('alert-box', 'Please fill in all fields');
      try {
        const data = await apiPost('/auth/login', { email, password });
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify({ username: data.username, role: data.role }));
        window.location.href = '/dashboard.html';
      } catch (e) {
        showAlert('alert-box', 'Invalid email or password');
      }
    }

    document.addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });

    function togglePassword(id, iconEl) {
      const input = document.getElementById(id);
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      iconEl.textContent = showing ? '👁' : '🙈';
    }
  </script>
</body>
</html>
